<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Privilege — end</title>
<style>
  :root {
    --ink: #f4efe6;
    --muted: #b9b0a3;
    --faint: #8a8174;
    --amber: #f5a623;
    --canvas: #14110e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--canvas); }
  body {
    width: 1920px;
    height: 1248px;
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    background:
      radial-gradient(1000px 700px at 70% 20%, rgba(245,166,35,.14), transparent 55%),
      linear-gradient(155deg, #181410 0%, #0e0c0a 60%, #15120f 100%);
  }
  #frame {
    width: 1920px;
    height: 1248px;
    padding: 110px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
  }
  .kicker {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--amber);
  }
  h1 {
    max-width: 18ch;
    font-size: 84px;
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.08;
  }
  .lede {
    max-width: 36ch;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 28px;
    line-height: 1.45;
    color: var(--muted);
  }
  .url {
    margin-top: 18px;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 32px;
    font-weight: 750;
    color: var(--amber);
    letter-spacing: -0.02em;
  }
  .honesty {
    margin-top: 40px;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 20px;
    color: var(--faint);
    letter-spacing: .02em;
  }
</style>
</head>
<body>
  <div id="frame">
    <div class="kicker">Privilege</div>
    <h1>Attack the draft.<br />Ship only what survives.</h1>
    <p class="lede">
      Local PDF preflight · consultant attestation · GPT-5.6 as attacker · anonymized PDF for any AI.
    </p>
    <div class="url">github.com/prasadt1/privilege</div>
    <div class="honesty">Built in Codex with GPT-5.6 · runtime attacker is GPT-5.6</div>
  </div>
</body>
</html>
